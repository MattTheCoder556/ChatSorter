name: build-exe

# Builds a standalone Windows ChatSorter.exe on a real Windows runner (you can't
# cross-build a Windows exe from Linux). Runs on every push to main and on demand;
# tagging a release (v*) also attaches the exe to a GitHub Release.
on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write        # needed for the release step to create/upload a Release

jobs:
  windows-exe:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install PyInstaller
        run: pip install pyinstaller

      - name: Build ChatSorter.exe
        run: >
          pyinstaller --noconfirm --onefile --windowed --name ChatSorter
          --hidden-import auto_sort --hidden-import watch_vault
          --hidden-import classify_vault --hidden-import sort_vault
          gui.py

      - name: Upload exe artifact
        uses: actions/upload-artifact@v4
        with:
          name: ChatSorter-windows
          path: dist/ChatSorter.exe

      - name: Attach exe to release (on tag)
        if: startsWith(github.ref, 'refs/tags/')
        run: gh release create "${{ github.ref_name }}" dist/ChatSorter.exe --generate-notes || gh release upload "${{ github.ref_name }}" dist/ChatSorter.exe --clobber
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash

  linux-bin:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Python + Tk + PyInstaller
        run: |
          sudo apt-get update
          sudo apt-get install -y python3-tk python3-venv
          python3 -m pip install --user pyinstaller

      - name: Build Linux binary
        run: >
          python3 -m PyInstaller --noconfirm --onefile --name ChatSorter-linux-x86_64
          --hidden-import auto_sort --hidden-import watch_vault
          --hidden-import classify_vault --hidden-import sort_vault
          gui.py

      - name: Upload Linux artifact
        uses: actions/upload-artifact@v4
        with:
          name: ChatSorter-linux
          path: dist/ChatSorter-linux-x86_64

      - name: Attach Linux binary to release (on tag)
        if: startsWith(github.ref, 'refs/tags/')
        run: gh release create "${{ github.ref_name }}" dist/ChatSorter-linux-x86_64 --generate-notes || gh release upload "${{ github.ref_name }}" dist/ChatSorter-linux-x86_64 --clobber
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
